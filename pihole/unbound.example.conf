# Sanitized Unbound config: the recursive resolver behind Pi-hole.
#
# Chain: clients -> Pi-hole (filtering/blocklists) -> Unbound (this) -> DNS roots.
#
# Why run Unbound at all, instead of pointing Pi-hole at 1.1.1.1 or 8.8.8.8:
# full recursive resolution means NO single upstream provider accumulates the
# household's complete DNS history. Pi-hole is the policy layer (what gets
# blocked); Unbound is the privacy layer (who gets to see the queries).
#
# Listens on localhost only. Pi-hole runs on the same host and is the only
# client. The rest of the network talks to Pi-hole, never to Unbound directly.

server:
    # Local-only: Pi-hole forwards to 127.0.0.1#5335
    interface: 127.0.0.1
    port: 5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    do-ip6: no

    # Only this host may query
    access-control: 127.0.0.0/8 allow
    access-control: 0.0.0.0/0 refuse

    # Root hints (update periodically)
    root-hints: "/var/lib/unbound/root.hints"

    # --- Hardening ---
    harden-glue: yes

    # This line is what actually turns on DNSSEC validation: the root trust
    # anchor, kept up to date via unbound-anchor. Without it, the DNSSEC
    # options below have nothing to validate against.
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # If a signed zone's answer arrives with its DNSSEC records stripped,
    # treat it as bogus rather than quietly downgrading to insecure.
    harden-dnssec-stripped: yes
    use-caps-for-id: no
    hide-identity: yes
    hide-version: yes

    # --- Privacy ---
    qname-minimisation: yes          # send each upstream server only the label it needs

    # --- Performance / cache ---
    edns-buffer-size: 1232
    prefetch: yes                    # refresh popular entries before they expire
    cache-min-ttl: 300
    cache-max-ttl: 86400
    num-threads: 1                   # small host, single-digit qps; keep it simple

    # Never forward or resolve private ranges upstream; keeps internal
    # addressing from ever leaking into recursive queries.
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16

# NOTE ON FALLBACK: pure recursion depends on this one box. Pi-hole's secondary
# upstream is a public DNSSEC-validating resolver (e.g. Quad9) so a failed
# Unbound degrades name resolution's *privacy*, not its *availability*. A
# deliberate trade, documented rather than discovered during an outage.
